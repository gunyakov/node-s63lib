name: Build Native Prebuilds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prebuild:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
          - name: windows-x64
            os: windows-latest
          - name: macos-x64
            os: macos-15-intel
          - name: macos-arm64
            os: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        env:
          GYP_MSVS_VERSION: 2022
          npm_config_msvs_version: 2022
        run: npm ci --ignore-scripts

      - name: Build prebuild tarball
        env:
          GYP_MSVS_VERSION: 2022
          npm_config_msvs_version: 2022
        run: npm run prebuild

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" prebuilds/*.tar.gz --clobber
