name: Build Main Prebuilds

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prebuild-main:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
          - name: windows-x64
            os: windows-latest
          - name: macos-x64
            os: macos-15-intel
          - name: macos-arm64
            os: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        env:
          GYP_MSVS_VERSION: 2022
          npm_config_msvs_version: 2022
        run: npm ci --ignore-scripts

      - name: Build prebuild tarball
        env:
          GYP_MSVS_VERSION: 2022
          npm_config_msvs_version: 2022
        run: npm run prebuild

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: prebuilds-${{ matrix.name }}
          path: prebuilds/*.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Publish rolling main release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view main-latest >/dev/null 2>&1 || gh release create main-latest --title main-latest --target "${GITHUB_SHA}" --prerelease --notes "Rolling prebuild binaries from main"
          gh release edit main-latest --target "${GITHUB_SHA}" --prerelease --title main-latest
          gh release upload main-latest prebuilds/*.tar.gz --clobber
